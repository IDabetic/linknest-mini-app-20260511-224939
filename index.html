<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Customizable Link-in-bio mini app." />
    <title>LinkNest - Link in Bio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Manrope:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg-orb bg-orb-a" aria-hidden="true"></div>
    <div class="bg-orb bg-orb-b" aria-hidden="true"></div>

    <main class="shell">
      <section class="profile-card" aria-live="polite">
        <button id="shareBtn" class="share-btn" type="button">Share</button>

        <div class="avatar-wrap">
          <img id="avatar" class="avatar" src="" alt="Profile avatar" />
          <div id="avatarFallback" class="avatar-fallback" aria-hidden="true"></div>
        </div>

        <h1 id="name" class="name"></h1>
        <p id="handle" class="handle"></p>
        <p id="bio" class="bio"></p>

        <div id="links" class="links" role="list"></div>

        <footer class="footer">
          <small id="updatedAt"></small>
        </footer>
      </section>
    </main>

    <template id="linkTemplate">
      <a class="link-card" target="_blank" rel="noopener noreferrer" role="listitem">
        <div class="text-wrap">
          <span class="link-title"></span>
          <span class="link-subtitle"></span>
        </div>
        <span class="link-tag"></span>
      </a>
    </template>

    <script src="./app.js" defer></script>
  </body>
</html>
